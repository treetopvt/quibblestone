<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="QuibbleStone">
  <!-- Brand tile (theme purple). Guardian mark echoes web/src/components/Guardian.tsx. -->
  <rect x="2" y="2" width="60" height="60" rx="16" fill="#6C4BD8" stroke="#5A3BC0" stroke-width="2" />
  <!-- Gold crown nub -->
  <circle cx="32" cy="13" r="4.5" fill="#FFB22E" stroke="#E89A12" stroke-width="1.5" />
  <!-- Carved-sandstone head -->
  <rect x="14" y="16" width="36" height="34" rx="13" fill="#E0CDA0" stroke="#B49B6E" stroke-width="2" />
  <!-- Eyes -->
  <rect x="22" y="28" width="7" height="11" rx="3.5" fill="#6C4BD8" />
  <rect x="35" y="28" width="7" height="11" rx="3.5" fill="#6C4BD8" />
  <!-- Smile -->
  <path d="M25 43 q7 6 14 0" stroke="#7C6442" stroke-width="3" fill="none" stroke-linecap="round" />
</svg>
