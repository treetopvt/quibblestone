<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="width:100%; height:100%; display:flex; align-items:center; justify-content:center;">
  <sc-if value="{{ isPurple }}" hint-placeholder-val="{{ true }}">
    <svg width="100%" height="100%" viewBox="0 0 56 56">
      <rect x="23" y="6" width="10" height="9" rx="2.5" fill="#C9B488"/>
      <rect x="10" y="12" width="36" height="36" rx="14" fill="#E0CDA0" stroke="#B49B6E" stroke-width="1.6"/>
      <rect x="18" y="26" width="7" height="11" rx="3.5" fill="#6C4BD8"/><rect x="31" y="26" width="7" height="11" rx="3.5" fill="#6C4BD8"/>
      <path d="M22 41 q6 6 12 0" stroke="#7C6442" stroke-width="2.6" fill="none" stroke-linecap="round"/>
    </svg>
  </sc-if>
  <sc-if value="{{ isGold }}" hint-placeholder-val="{{ false }}">
    <svg width="100%" height="100%" viewBox="0 0 56 56">
      <path d="M16 14 l4 -8 l4 6 l4 -7 l4 7 l4 -6 l4 8 z" fill="#FFB22E"/>
      <rect x="10" y="12" width="36" height="36" rx="14" fill="#E0CDA0" stroke="#B49B6E" stroke-width="1.6"/>
      <rect x="18" y="26" width="7" height="11" rx="3.5" fill="#E89A12"/><rect x="31" y="26" width="7" height="11" rx="3.5" fill="#E89A12"/>
      <path d="M22 41 q6 6 12 0" stroke="#7C6442" stroke-width="2.6" fill="none" stroke-linecap="round"/>
    </svg>
  </sc-if>
  <sc-if value="{{ isCoral }}" hint-placeholder-val="{{ false }}">
    <svg width="100%" height="100%" viewBox="0 0 56 56">
      <path d="M18 14 l-2 -8 l8 6 z" fill="#FF6B57"/><path d="M38 14 l2 -8 l-8 6 z" fill="#FF6B57"/>
      <rect x="10" y="12" width="36" height="36" rx="14" fill="#E0CDA0" stroke="#B49B6E" stroke-width="1.6"/>
      <rect x="18" y="26" width="7" height="11" rx="3.5" fill="#FF6B57"/><rect x="31" y="26" width="7" height="11" rx="3.5" fill="#FF6B57"/>
      <path d="M22 41 q6 6 12 0" stroke="#7C6442" stroke-width="2.6" fill="none" stroke-linecap="round"/>
    </svg>
  </sc-if>
  <sc-if value="{{ isTeal }}" hint-placeholder-val="{{ false }}">
    <svg width="100%" height="100%" viewBox="0 0 56 56">
      <path d="M28 14 q-1 -8 -8 -9 q3 7 8 9z" fill="#2FB8A0"/><rect x="26.5" y="7" width="3" height="7" rx="1.5" fill="#1f8a78"/>
      <rect x="10" y="12" width="36" height="36" rx="14" fill="#E0CDA0" stroke="#B49B6E" stroke-width="1.6"/>
      <rect x="18" y="26" width="7" height="11" rx="3.5" fill="#2FB8A0"/><rect x="31" y="26" width="7" height="11" rx="3.5" fill="#2FB8A0"/>
      <path d="M22 41 q6 6 12 0" stroke="#7C6442" stroke-width="2.6" fill="none" stroke-linecap="round"/>
    </svg>
  </sc-if>
  <sc-if value="{{ isSand }}" hint-placeholder-val="{{ false }}">
    <svg width="100%" height="100%" viewBox="0 0 56 56">
      <circle cx="13" cy="28" r="6" fill="#D3BE92" stroke="#B49B6E" stroke-width="1.4"/><circle cx="43" cy="28" r="6" fill="#D3BE92" stroke="#B49B6E" stroke-width="1.4"/>
      <rect x="12" y="12" width="32" height="36" rx="14" fill="#E0CDA0" stroke="#B49B6E" stroke-width="1.6"/>
      <rect x="19" y="26" width="7" height="11" rx="3.5" fill="#7C6442"/><rect x="30" y="26" width="7" height="11" rx="3.5" fill="#7C6442"/>
      <path d="M23 41 q5 6 10 0" stroke="#7C6442" stroke-width="2.6" fill="none" stroke-linecap="round"/>
    </svg>
  </sc-if>
  <sc-if value="{{ isPlum }}" hint-placeholder-val="{{ false }}">
    <svg width="100%" height="100%" viewBox="0 0 56 56">
      <path d="M28 13 q4 -5 9 -9" stroke="#9B7BE0" stroke-width="2.4" fill="none" stroke-linecap="round"/><circle cx="38" cy="4" r="3.4" fill="#9B7BE0"/>
      <rect x="10" y="12" width="36" height="36" rx="14" fill="#E0CDA0" stroke="#B49B6E" stroke-width="1.6"/>
      <rect x="18" y="26" width="7" height="11" rx="3.5" fill="#9B7BE0"/><rect x="31" y="26" width="7" height="11" rx="3.5" fill="#9B7BE0"/>
      <path d="M22 41 q6 6 12 0" stroke="#7C6442" stroke-width="2.6" fill="none" stroke-linecap="round"/>
    </svg>
  </sc-if>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:80,&quot;height&quot;:80},&quot;variant&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;teal&quot;,&quot;options&quot;:[&quot;purple&quot;,&quot;gold&quot;,&quot;coral&quot;,&quot;teal&quot;,&quot;sand&quot;,&quot;plum&quot;],&quot;tsType&quot;:&quot;'purple'|'gold'|'coral'|'teal'|'sand'|'plum'&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const v = this.props.variant || 'purple';
    return {
      isPurple: v === 'purple', isGold: v === 'gold', isCoral: v === 'coral',
      isTeal: v === 'teal', isSand: v === 'sand', isPlum: v === 'plum',
    };
  }
}
</script>
</body>
</html>
