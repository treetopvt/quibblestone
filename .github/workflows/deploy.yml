# Deploy - build, then deploy both projects to Azure UAT.
#
# Fires automatically on every push to main (i.e. right after an approved PR
# merges) so main is continuously delivered to UAT, plus a manual
# workflow_dispatch for re-runs. The build steps mirror CI (build + unit tests)
# so a broken tree never reaches the cloud.
#
# First deploy auto-provisions: if the Azure footprint is not there yet, this
# workflow stands it up from infra/main.bicep (default SKU F1 = Free/$0) before
# deploying, so a fresh repo needs nothing beyond the one-time OIDC bootstrap.
# The Provision UAT workflow is still there for explicit provisioning or to
# scale the plan SKU up/down.
#
# Auth is OIDC (federated) - GitHub logs into Azure with a short-lived token, so
# there are NO long-lived publish profiles or Static Web Apps tokens stored in
# the repo. Because we are logged into Azure, the workflow DISCOVERS the resource
# names and URLs from the resource group at run time (they carry a
# uniqueString() suffix), so there are no hand-copied URL variables to keep in
# sync either. The only repo configuration is the three OIDC identifiers below.
#
# Required repository configuration (one-time - see docs/runbooks/deploy-to-uat.md):
#   secrets.AZURE_CLIENT_ID        - the federated app registration's client id
#   secrets.AZURE_TENANT_ID        - the Azure AD tenant id
#   secrets.AZURE_SUBSCRIPTION_ID  - the target subscription id
#   vars.AZURE_RESOURCE_GROUP      - optional; defaults to quibblestone-uat-rg
#
# Optional AI cost gate (ai-cost-gate/06) - provisioned only when configured, so a
# repo without the AI gate deploys unchanged. The AI provider lives in a SEPARATE
# subscription (the app's sub cannot host Azure OpenAI); the same OIDC identity
# reaches it because both subs are in one tenant and it was granted rights on the
# AI resource group:
#   vars.AI_SUBSCRIPTION_ID        - the PAYG sub that hosts Azure OpenAI (enables the AI step)
#   vars.AI_RESOURCE_GROUP         - optional; defaults to quibblestone-ai-rg (must pre-exist)
#   vars.AI_LOCATION               - optional; defaults to eastus2
#   secrets.AI_ALERT_EMAIL         - budget alert recipient (omit -> budget/action group skipped)
#
# Optional Stripe billing (billing-entitlements/03 + /06) - wired only when
# configured, so a repo without billing deploys unchanged. Mode-aware: the app holds
# a Live AND a Test credential set and an operator toggle picks the active one. All
# Stripe SECRETS (per mode) + the toggle gate secret live in Key Vault (set once, out
# of band - never in GitHub) and are wired as KV references; only the (non-secret)
# price ids and the on/off flag are repo vars. See docs/runbooks/enable-stripe-billing.md:
#   vars.STRIPE_ENABLED            - 'true' enables the wiring step (default off)
#   vars.STRIPE_TEST_TIP_PRICE_ID  - the test-mode goodwill tip price id
#   vars.STRIPE_LIVE_TIP_PRICE_ID  - the live-mode goodwill tip price id
#   vars.STRIPE_{TEST,LIVE}_FAMILY_PLAN_PRICE_ID / _PACK_SPOOKY_PRICE_ID - optional paywall
#   vars.STRIPE_TIP_PRICE_ID (+ _FAMILY_PLAN_ / _PACK_SPOOKY_) - LEGACY single-mode fallback
#   Key Vault secrets: Stripe{Test,Live}SecretKey, Stripe{Test,Live}WebhookSigningSecret,
#                      OperatorModeToggleSecret (the toggle gate), and the legacy
#                      StripeSecretKey / StripeWebhookSigningSecret (flat fallback)
#
# Nothing secret is committed, and no secret goes into a VITE_* var: Vite bakes
# VITE_-prefixed vars into the public bundle, so only the (public) deployed API
# URL is passed there, and it is discovered here rather than hardcoded (AC-04).
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Queue overlapping deploys instead of racing them onto the same environment.
concurrency:
  group: deploy-uat
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # required for OIDC federated login to Azure

jobs:
  deploy:
    name: Build + deploy to UAT
    runs-on: ubuntu-latest
    environment:
      name: uat
      url: ${{ steps.discover.outputs.web_url }}
    env:
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP || 'quibblestone-uat-rg' }}
      # First-deploy auto-provision knobs (both default to $0 / a SWA-supported
      # region). Override with repo variables to scale up or move region without
      # touching this file.
      PROVISION_SKU: ${{ vars.APP_SERVICE_PLAN_SKU || 'F1' }}
      PROVISION_LOCATION: ${{ vars.AZURE_LOCATION || 'eastus2' }}
      # AI cost gate (separate subscription). The AI step is skipped entirely
      # unless AI_SUBSCRIPTION_ID is set (see the header notes).
      AI_SUBSCRIPTION_ID: ${{ vars.AI_SUBSCRIPTION_ID }}
      AI_RESOURCE_GROUP: ${{ vars.AI_RESOURCE_GROUP || 'quibblestone-ai-rg' }}
      AI_LOCATION: ${{ vars.AI_LOCATION || 'eastus2' }}
    steps:
      - uses: actions/checkout@v5

      # --- Build + test gate (mirrors CI so we never deploy an unbuilt tree) ---
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Build + test API
        run: |
          dotnet restore QuibbleStone.slnx
          dotnet build QuibbleStone.slnx --configuration Release --no-restore
          dotnet test QuibbleStone.slnx --configuration Release --no-build

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Web unit tests
        working-directory: web
        run: |
          npm ci
          npm run test:unit

      # --- Publish the API package (built above) ------------------------------
      - name: Publish API
        run: dotnet publish api/QuibbleStone.Api.csproj -c Release -o ./publish --no-build

      # --- Log into Azure via OIDC (no stored secret) -------------------------
      - name: Azure login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # --- Provision on EVERY deploy (idempotent) -----------------------------
      # The Bicep is incremental and idempotent, so a no-change deploy is a fast
      # no-op - but running it every time means a Bicep change (a new resource, a
      # new app setting) actually LANDS in UAT on the merge that ships it, instead
      # of silently drifting until someone runs Provision UAT by hand. (Previously
      # this ran only on the first deploy, so App Insights / new settings merged
      # to main but never provisioned - see the fix that introduced this.)
      #
      # SKU is PRESERVED from the live plan so a routine deploy never downgrades a
      # scaled-up plan (e.g. B1 -> the F1 default). First deploy (no plan yet)
      # falls back to PROVISION_SKU; change the SKU deliberately via the Provision
      # UAT workflow (or the APP_SERVICE_PLAN_SKU repo variable).
      #
      # NOTE: the Bicep sets the API's appSettings (telemetry connection strings),
      # which replaces the settings array - so it drops the CORS origins. That is
      # fine here because the "Set API CORS origins" step below runs AFTER this and
      # re-applies them; keep that ordering.
      - name: Ensure UAT is provisioned
        run: |
          set -euo pipefail
          rg="$AZURE_RESOURCE_GROUP"
          az group create -n "$rg" -l "$PROVISION_LOCATION" --output none

          current_sku="$(az appservice plan list -g "$rg" --query "[?contains(name, 'quibblestone')] | [0].sku.name" -o tsv 2>/dev/null || true)"
          sku="${current_sku:-$PROVISION_SKU}"

          echo "Provisioning footprint from infra/main.bicep (SKU $sku, $PROVISION_LOCATION)..."
          az deployment group create \
            -g "$rg" \
            -n "provision-${{ github.run_number }}" \
            -f infra/main.bicep \
            -p namePrefix=quibblestone \
               environmentName=uat \
               appServicePlanSku="$sku" \
               location="$PROVISION_LOCATION" \
            --output none
          echo "Provisioned (SKU $sku)."

      # --- Discover the resources in the group (names carry a unique suffix) ---
      # The UAT resource group holds exactly one App Service and one Static Web
      # App (see infra/main.bicep), both tagged app=quibblestone. We read their
      # names + hostnames rather than storing them, so re-provisioning never
      # requires touching repo config.
      - name: Discover Azure resources
        id: discover
        run: |
          set -euo pipefail
          rg="$AZURE_RESOURCE_GROUP"

          api_name="$(az webapp list -g "$rg" --query "[?tags.app=='quibblestone'] | [0].name" -o tsv)"
          web_name="$(az staticwebapp list -g "$rg" --query "[?tags.app=='quibblestone'] | [0].name" -o tsv)"
          if [ -z "$api_name" ] || [ -z "$web_name" ]; then
            echo "::error::Could not find the API/web resources in '$rg' even after auto-provision. Check the 'Ensure UAT is provisioned' step and the OIDC role assignment (see docs/runbooks/deploy-to-uat.md)."
            exit 1
          fi

          api_host="$(az webapp show -g "$rg" -n "$api_name" --query defaultHostName -o tsv)"
          web_host="$(az staticwebapp show -g "$rg" -n "$web_name" --query defaultHostname -o tsv)"

          {
            echo "api_name=$api_name"
            echo "web_name=$web_name"
            echo "api_base=https://$api_host"
            echo "web_origin=https://$web_host"
            echo "web_url=https://$web_host"
          } >> "$GITHUB_OUTPUT"
          echo "API -> https://$api_host  |  Web -> https://$web_host"

      # --- Provision the AI cost gate footprint (SEPARATE subscription) --------
      # The Azure OpenAI account cannot live in the app's subscription (it is an
      # "Azure for Students" sub that cannot host Cognitive Services OpenAI). It
      # lives in its own resource group on a Pay-As-You-Go sub in the SAME tenant;
      # the app's managed identity reaches it cross-subscription, KEYLESS, via a
      # role assignment in infra/ai.bicep. The OIDC identity was granted rights on
      # the AI resource group (scoped, least-privilege), so no extra credential is
      # needed. This step is SKIPPED unless AI_SUBSCRIPTION_ID is configured, so a
      # repo without the AI gate deploys exactly as before.
      #
      # alertEmail is a SECRET (never committed); omit it and the budget + action
      # group are simply not provisioned (the app still runs; story-04's app
      # breaker is the real-time enforcer regardless).
      #
      # main.bicep (the "Ensure UAT is provisioned" step) REPLACED the API
      # appSettings array, which drops Ai__Endpoint/Ai__Deployment just like it
      # drops CORS - so we re-set them here from ai.bicep's outputs. appsettings
      # set is additive, so it does not disturb the CORS origins applied below. The
      # AI resource group must pre-exist (provisioned once out of band, since the
      # OIDC identity is scoped to that RG rather than the whole AI subscription).
      - name: Provision AI cost gate (separate subscription)
        if: ${{ vars.AI_SUBSCRIPTION_ID != '' }}
        env:
          AI_ALERT_EMAIL: ${{ secrets.AI_ALERT_EMAIL }}
        run: |
          set -euo pipefail
          app_sub="${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          api="${{ steps.discover.outputs.api_name }}"

          az account set -s "$AI_SUBSCRIPTION_ID"

          email_arg=()
          if [ -n "${AI_ALERT_EMAIL:-}" ]; then
            email_arg=(-p "alertEmail=${AI_ALERT_EMAIL}")
          else
            echo "::warning::AI_ALERT_EMAIL not set - the \$20 budget + action group will be skipped."
          fi

          echo "Provisioning AI footprint from infra/ai.bicep into $AI_RESOURCE_GROUP ($AI_SUBSCRIPTION_ID)..."
          outputs="$(az deployment group create \
            -g "$AI_RESOURCE_GROUP" \
            -n "ai-provision-${{ github.run_number }}" \
            -f infra/ai.bicep \
            -p infra/ai.uat.bicepparam \
            -p location="$AI_LOCATION" \
            "${email_arg[@]}" \
            --query properties.outputs -o json)"

          ai_endpoint="$(echo "$outputs" | jq -r '.aiEndpoint.value')"
          ai_deployment="$(echo "$outputs" | jq -r '.aiDeploymentNameOut.value')"

          # Back to the app subscription for the rest of the deploy, and wire the
          # endpoint + deployment name onto the API app (re-applying what the
          # main.bicep provision dropped).
          az account set -s "$app_sub"
          az webapp config appsettings set -g "$AZURE_RESOURCE_GROUP" -n "$api" \
            --settings "Ai__Endpoint=${ai_endpoint}" "Ai__Deployment=${ai_deployment}" \
            --output none
          echo "AI gate provisioned: ${ai_deployment} @ ${ai_endpoint}"

      # --- Let the API accept every web origin for REST + the SignalR hub -----
      # AllowCredentials is on for the hub transport, so CORS cannot use a
      # wildcard - it must list each exact origin (see api/src/Program.cs). We
      # allow the SWA default origin PLUS every custom domain bound to the SWA
      # (apex, www, and any future uat./dev.), discovered at run time so binding
      # a new domain in Azure needs no change here. The list is cleared and
      # re-set each run so a removed domain does not linger as an allowed origin.
      - name: Set API CORS origins
        run: |
          set -euo pipefail
          rg="$AZURE_RESOURCE_GROUP"
          api="${{ steps.discover.outputs.api_name }}"
          web="${{ steps.discover.outputs.web_name }}"

          # SWA default origin + every Ready custom domain bound to the SWA.
          origins=("${{ steps.discover.outputs.web_origin }}")
          while IFS= read -r domain; do
            [ -n "$domain" ] && origins+=("https://$domain")
          done < <(az staticwebapp hostname list -g "$rg" -n "$web" \
                     --query "[?status=='Ready'].domainName" -o tsv)

          # Drop any previous Cors__AllowedOrigins__* first, so a domain that was
          # removed from the SWA does not survive as a stale allowed origin.
          stale="$(az webapp config appsettings list -g "$rg" -n "$api" \
                     --query "[?starts_with(name, 'Cors__AllowedOrigins__')].name" -o tsv)"
          if [ -n "$stale" ]; then
            az webapp config appsettings delete -g "$rg" -n "$api" \
              --setting-names $stale --output none
          fi

          # Re-set the full allow-list as Cors__AllowedOrigins__0..N.
          settings=(); i=0
          for origin in "${origins[@]}"; do
            settings+=("Cors__AllowedOrigins__${i}=${origin}")
            i=$((i + 1))
          done
          az webapp config appsettings set -g "$rg" -n "$api" \
            --settings "${settings[@]}" --output none

          echo "CORS origins allowed:"; printf '  %s\n' "${origins[@]}"

      # --- Wire Stripe billing (optional, repo-variable-gated) ----------------
      # billing-entitlements/03 + /06. Same posture as the AI gate above: the whole
      # billing seam is built and ships DISABLED (no secret key in any mode => the
      # no-op checkout service + a 503 webhook), so a repo without this configured
      # deploys exactly as before. This step re-applies the Stripe settings AFTER
      # the "Ensure UAT is provisioned" step (which REPLACES the appSettings array
      # and so drops anything not re-applied - the same reason CORS + AI are
      # re-set here); appsettings set is additive, so it does not disturb them.
      # Because the provision REPLACES the array first, stale settings from a prior
      # wiring (e.g. after migrating off the legacy flat vars) self-heal: only what
      # is currently configured is re-applied.
      #
      # MODE-AWARE (billing-entitlements/06): the app holds a Live AND a Test
      # credential set at once and an operator toggle picks which is active. Each
      # mode's SECRETS live in Key Vault (set ONCE, out of band - see the runbook)
      # and are wired as @Microsoft.KeyVault references, resolved at runtime by the
      # API's SystemAssigned identity (granted "Key Vault Secrets User" in
      # infra/main.bicep). So no Stripe secret ever touches GitHub, this file, or a
      # VITE_ var. Price ids are NOT secret (env-specific) and come from repo vars.
      # The operator toggle's interim gate secret (Admin__ModeToggleSecret) is a KV
      # ref too; if that KV secret is unset the gate denies all, so the toggle is
      # inert rather than open. ClientBaseUrl is the public web origin (custom domain
      # if bound) so Stripe redirects land on the real site.
      #
      # SKIPPED entirely unless vars.STRIPE_ENABLED == 'true'. One-time setup (see
      # docs/runbooks/enable-stripe-billing.md):
      #   Key Vault secrets (per mode): StripeTestSecretKey / StripeTestWebhookSigningSecret,
      #                                 StripeLiveSecretKey / StripeLiveWebhookSigningSecret
      #   Key Vault secret (toggle gate): OperatorModeToggleSecret
      #   Key Vault secret (operator allowlist): OperatorAllowedEmails (one delimited value)
      #   vars.STRIPE_ENABLED               = 'true'
      #   vars.STRIPE_TEST_TIP_PRICE_ID     = price_... (test-mode tip)
      #   vars.STRIPE_LIVE_TIP_PRICE_ID     = price_... (live-mode tip)
      #   vars.STRIPE_{TEST,LIVE}_FAMILY_PLAN_PRICE_ID / _PACK_SPOOKY_PRICE_ID (optional paywall)
      #   LEGACY (pre-/06 single-mode): Key Vault StripeSecretKey / StripeWebhookSigningSecret
      #                                 + vars.STRIPE_TIP_PRICE_ID - still honored as the
      #                                 flat fallback so an existing deployment keeps working.
      - name: Wire Stripe billing (optional)
        if: ${{ vars.STRIPE_ENABLED == 'true' }}
        run: |
          set -euo pipefail
          rg="$AZURE_RESOURCE_GROUP"
          api="${{ steps.discover.outputs.api_name }}"
          web="${{ steps.discover.outputs.web_name }}"

          # The single Key Vault in the group (infra/main.bicep provisions one). The
          # API identity already has "Key Vault Secrets User" on it, so a
          # @Microsoft.KeyVault(VaultName=...;SecretName=...) reference resolves at
          # runtime - the secret VALUE is set out of band, never here.
          vault="$(az keyvault list -g "$rg" --query "[0].name" -o tsv)"
          if [ -z "$vault" ]; then
            echo "::error::STRIPE_ENABLED is true but no Key Vault was found in '$rg'. Provision must run first."
            exit 1
          fi
          kv() { echo "@Microsoft.KeyVault(VaultName=${vault};SecretName=$1)"; }

          # ClientBaseUrl: prefer the first Ready custom domain bound to the SWA (the
          # public face, e.g. quibblestone.com), else the SWA default host - so
          # Stripe's success/cancel redirects go to the real site, not localhost.
          client_base="${{ steps.discover.outputs.web_origin }}"
          custom="$(az staticwebapp hostname list -g "$rg" -n "$web" \
                      --query "[?status=='Ready'].domainName" -o tsv | head -n1)"
          [ -n "$custom" ] && client_base="https://$custom"

          # Always set: the mode-independent client base + the operator console gate
          # secrets. NOTE (sysadmin-console/01): the operator sign-in allowlist rides
          # this STRIPE_ENABLED-gated step next to the mode-toggle gate. UAT keeps
          # STRIPE_ENABLED=true so it always applies; if billing is ever gated off,
          # promote the Operator__AllowedEmails line to an always-run step so operator
          # login (and content takedown) keeps working. The value is ONE delimited KV
          # secret (OperatorAllowedEmails); unset => empty allowlist => fail closed.
          settings=(
            "Stripe__ClientBaseUrl=${client_base}"
            "Admin__ModeToggleSecret=$(kv OperatorModeToggleSecret)"
            "Operator__AllowedEmails=$(kv OperatorAllowedEmails)"
          )
          have_price=0

          # LEGACY flat wiring (pre-/06 single-mode) - kept for back-compat so an existing
          # deployment keeps working; ForMode falls back to these when a per-mode section
          # is unset. Migrate to the per-mode vars below and this block simply stops applying.
          if [ -n "${{ vars.STRIPE_TIP_PRICE_ID }}" ]; then
            settings+=(
              "Stripe__SecretKey=$(kv StripeSecretKey)"
              "Stripe__WebhookSigningSecret=$(kv StripeWebhookSigningSecret)"
              "Stripe__PriceIds__tip=${{ vars.STRIPE_TIP_PRICE_ID }}"
            )
            [ -n "${{ vars.STRIPE_FAMILY_PLAN_PRICE_ID }}" ] && settings+=("Stripe__PriceIds__family-plan=${{ vars.STRIPE_FAMILY_PLAN_PRICE_ID }}")
            [ -n "${{ vars.STRIPE_PACK_SPOOKY_PRICE_ID }}" ] && settings+=("Stripe__PriceIds__pack.spooky=${{ vars.STRIPE_PACK_SPOOKY_PRICE_ID }}")
            have_price=1
          fi

          # TEST mode (billing-entitlements/06) - wired when its tip price is configured.
          if [ -n "${{ vars.STRIPE_TEST_TIP_PRICE_ID }}" ]; then
            settings+=(
              "Stripe__Test__SecretKey=$(kv StripeTestSecretKey)"
              "Stripe__Test__WebhookSigningSecret=$(kv StripeTestWebhookSigningSecret)"
              "Stripe__Test__PriceIds__tip=${{ vars.STRIPE_TEST_TIP_PRICE_ID }}"
            )
            [ -n "${{ vars.STRIPE_TEST_FAMILY_PLAN_PRICE_ID }}" ] && settings+=("Stripe__Test__PriceIds__family-plan=${{ vars.STRIPE_TEST_FAMILY_PLAN_PRICE_ID }}")
            [ -n "${{ vars.STRIPE_TEST_PACK_SPOOKY_PRICE_ID }}" ] && settings+=("Stripe__Test__PriceIds__pack.spooky=${{ vars.STRIPE_TEST_PACK_SPOOKY_PRICE_ID }}")
            have_price=1
          fi

          # LIVE mode (billing-entitlements/06) - wired when its tip price is configured.
          if [ -n "${{ vars.STRIPE_LIVE_TIP_PRICE_ID }}" ]; then
            settings+=(
              "Stripe__Live__SecretKey=$(kv StripeLiveSecretKey)"
              "Stripe__Live__WebhookSigningSecret=$(kv StripeLiveWebhookSigningSecret)"
              "Stripe__Live__PriceIds__tip=${{ vars.STRIPE_LIVE_TIP_PRICE_ID }}"
            )
            [ -n "${{ vars.STRIPE_LIVE_FAMILY_PLAN_PRICE_ID }}" ] && settings+=("Stripe__Live__PriceIds__family-plan=${{ vars.STRIPE_LIVE_FAMILY_PLAN_PRICE_ID }}")
            [ -n "${{ vars.STRIPE_LIVE_PACK_SPOOKY_PRICE_ID }}" ] && settings+=("Stripe__Live__PriceIds__pack.spooky=${{ vars.STRIPE_LIVE_PACK_SPOOKY_PRICE_ID }}")
            have_price=1
          fi

          if [ "$have_price" -eq 0 ]; then
            echo "::error::STRIPE_ENABLED is true but no price id is configured (set STRIPE_TEST_TIP_PRICE_ID and/or STRIPE_LIVE_TIP_PRICE_ID, or the legacy STRIPE_TIP_PRICE_ID)."
            exit 1
          fi

          az webapp config appsettings set -g "$rg" -n "$api" \
            --settings "${settings[@]}" --output none
          echo "Stripe billing wired (${#settings[@]} settings) via Key Vault '$vault'; ClientBaseUrl=$client_base."

      # --- Wire magic-link email delivery (optional, repo-variable-gated) ------
      # accounts-identity/04 (#167). Same posture as the AI gate + Stripe above: the
      # email seam is BUILT and ships DISABLED (no Email:* provider => the
      # NoOpEmailSender, so a deployed env behaves EXACTLY as before, AC-03). This step
      # re-applies the Email settings AFTER the provision step replaces the appSettings
      # array (the reason CORS / AI / Stripe are all re-applied here). It is SKIPPED
      # entirely unless vars.EMAIL_ENABLED == 'true', so a repo without this configured
      # deploys exactly as before - the story is safe to merge inert.
      #
      # RECOMMENDED keyless path (AC-05): set vars.EMAIL_ENDPOINT (+ FROM_ADDRESS) - the
      # API's managed identity authenticates to ACS, so there is NO provider secret to
      # store. Grant that identity the ACS "send email" role out of band (runbook).
      # FALLBACK keyed path: leave EMAIL_ENDPOINT unset and supply the ACS connection
      # string from Key Vault (EmailConnectionString) instead - the only secret.
      #
      # AC-07: also wires a DURABLE Accounts__TokenSigningKey from Key Vault, so a
      # delivered link keeps verifying across an app recycle / scale-out (today's
      # ephemeral per-process key would silently invalidate it). Ships WITH delivery.
      #
      # One-time setup (see docs/runbooks/enable-magic-link-email.md):
      #   Key Vault secret (durable signing key): AccountsTokenSigningKey
      #   Key Vault secret (ONLY on the keyed fallback): EmailConnectionString
      #   vars.EMAIL_ENABLED       = 'true'
      #   vars.EMAIL_ENDPOINT      = https://<acs>.communication.azure.com  (keyless path)
      #   vars.EMAIL_FROM_ADDRESS  = no-reply@quibblestone.com  (a verified sender domain)
      - name: Wire magic-link email delivery (optional)
        if: ${{ vars.EMAIL_ENABLED == 'true' }}
        run: |
          set -euo pipefail
          rg="$AZURE_RESOURCE_GROUP"
          api="${{ steps.discover.outputs.api_name }}"
          web="${{ steps.discover.outputs.web_name }}"

          vault="$(az keyvault list -g "$rg" --query "[0].name" -o tsv)"
          if [ -z "$vault" ]; then
            echo "::error::EMAIL_ENABLED is true but no Key Vault was found in '$rg'. Provision must run first."
            exit 1
          fi
          kv() { echo "@Microsoft.KeyVault(VaultName=${vault};SecretName=$1)"; }

          # LinkBaseUrl: the public web origin (first Ready custom domain if bound, else
          # the SWA default host) so the emailed link points at the real site.
          link_base="${{ steps.discover.outputs.web_origin }}"
          custom="$(az staticwebapp hostname list -g "$rg" -n "$web" \
                      --query "[?status=='Ready'].domainName" -o tsv | head -n1)"
          [ -n "$custom" ] && link_base="https://$custom"

          if [ -z "${{ vars.EMAIL_FROM_ADDRESS }}" ]; then
            echo "::error::EMAIL_ENABLED is true but EMAIL_FROM_ADDRESS is unset (a verified sender is required)."
            exit 1
          fi

          # AC-07: a durable, Key Vault-backed magic-link signing key (survives recycle),
          # plus the always-required non-secret from-address + link base.
          settings=(
            "Accounts__TokenSigningKey=$(kv AccountsTokenSigningKey)"
            "Email__FromAddress=${{ vars.EMAIL_FROM_ADDRESS }}"
            "Email__LinkBaseUrl=${link_base}"
          )
          # Keyless (recommended, no secret): the ACS endpoint + the managed identity.
          if [ -n "${{ vars.EMAIL_ENDPOINT }}" ]; then
            settings+=("Email__Endpoint=${{ vars.EMAIL_ENDPOINT }}")
          else
            # Keyed fallback: the Key Vault-backed ACS connection string (the only secret).
            settings+=("Email__ConnectionString=$(kv EmailConnectionString)")
          fi

          az webapp config appsettings set -g "$rg" -n "$api" \
            --settings "${settings[@]}" --output none
          echo "Magic-link email wired (${#settings[@]} settings) via Key Vault '$vault'; LinkBaseUrl=$link_base."

      # --- Deploy the API (uses the OIDC session, no publish profile) ---------
      - name: Deploy API to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ steps.discover.outputs.api_name }}
          package: ./publish

      # --- Build the web bundle pointed at the DEPLOYED API (AC-04) -----------
      # SIGNALR hub URL is derived from the API base (the /hubs/game route).
      - name: Build web
        working-directory: web
        env:
          VITE_API_BASE_URL: ${{ steps.discover.outputs.api_base }}
          VITE_SIGNALR_HUB_URL: ${{ steps.discover.outputs.api_base }}/hubs/game
        run: npm run build

      # --- Deploy the web bundle; fetch the SWA token at run time via OIDC ----
      - name: Get Static Web Apps token
        id: swa
        run: |
          token="$(az staticwebapp secrets list \
            -g "$AZURE_RESOURCE_GROUP" \
            -n "${{ steps.discover.outputs.web_name }}" \
            --query "properties.apiKey" -o tsv)"
          echo "::add-mask::$token"
          echo "token=$token" >> "$GITHUB_OUTPUT"

      - name: Deploy web to Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa.outputs.token }}
          action: upload
          app_location: web/dist
          skip_app_build: true
