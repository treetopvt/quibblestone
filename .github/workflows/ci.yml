# CI - build both projects on every push/PR to main.
# This is the "build both projects" half of README section 9. The deploy half
# lives in deploy.yml. Keep this green before merging.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  api:
    name: Build + test API (.NET)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Restore
        run: dotnet restore QuibbleStone.slnx
      - name: Build
        run: dotnet build QuibbleStone.slnx --configuration Release --no-restore
      # Unit tests (xUnit) gate the build: a failing spec fails the run. Coverage
      # is collected via coverlet (XPlat Code Coverage) and uploaded as an
      # artifact (see tests/QuibbleStone.Api.Tests).
      - name: Test
        run: >-
          dotnet test QuibbleStone.slnx --configuration Release --no-build
          --collect:"XPlat Code Coverage"
          --results-directory ${{ github.workspace }}/TestResults
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: dotnet-coverage
          path: '**/TestResults/**/coverage.cobertura.xml'
          if-no-files-found: warn

  web:
    name: Build web (Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install
        run: npm ci
      # Unit tests (Vitest) gate the build: a failing pure-logic spec fails the
      # run (platform-devops/01 AC-03). Playwright e2e is NOT in CI yet - the
      # smoke test needs the API hub running; that lands with a runnable stack.
      - name: Unit tests
        run: npm run test:unit
      - name: Build
        run: npm run build
